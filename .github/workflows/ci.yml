name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: "Run live Meta smoke tests"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Fast-feedback unit-only run; coverage gate is enforced in the
      # integration-replay job (which has the full code surface visible).
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov-fail-under=0

  integration-replay:
    name: Integration (HAR Replay) + Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          playwright install chromium --with-deps

      # Runs the full non-live suite (unit + integration) with coverage
      # so the gate has the complete code surface to measure against.
      # `fail_under = 78` lives in pyproject.toml [tool.coverage.report];
      # any drop below that floor fails this job.
      - name: Run tests with coverage gate
        run: pytest -m "not live_test" -v --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  live-smoke:
    name: Live Smoke (Manual Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          playwright install chromium --with-deps

      - name: Run live smoke tests
        env:
          META_LIVE_TESTS: "1"
        run: pytest tests/integration/ -v -m "live_test"
